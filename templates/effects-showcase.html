<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Effects Showcase</title>
  <link rel="stylesheet" href="../runtime/styles.css" />
  <link rel="stylesheet" href="../assets/fonts/fonts.css" />
  <style>
    .grid {
      position: absolute; inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 16px;
      padding: 60px;
      background: #06060d;
    }
    .cell {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background: #0a0a16;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .cell .label {
      position: absolute;
      bottom: 14px;
      left: 16px;
      font-family: "JetBrains Mono", monospace;
      font-size: 18px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 6px 12px;
      border-radius: 4px;
      z-index: 50;
      letter-spacing: 0.1em;
    }
    .pill {
      padding: 30px 50px;
      font-family: "Noto Sans SC";
      font-weight: 900;
      font-size: 60px;
      color: white;
      background: rgba(20, 20, 30, 0.8);
      border-radius: 16px;
      letter-spacing: 0.05em;
      position: relative;
    }
    .bg-fullsize {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
    .odom {
      font-family: "Noto Sans SC";
      font-weight: 900;
      font-size: 130px;
      color: #FF8B5E;
      filter: drop-shadow(0 4px 20px rgba(255,139,94,0.5));
    }
  </style>
</head>
<body class="mvm-preview">
  <div id="stage"
       data-composition-id="effects-showcase"
       data-width="1920" data-height="1080" data-fps="15" data-duration="3">

    <div class="grid">

      <!-- Electric Border -->
      <div class="cell">
        <div class="pill"
             data-effect="electric-border"
             data-color="#FF6363" data-color2="#FFD400" data-color3="#5BC0EB"
             data-intensity="1.3" data-speed="1.6" data-padding="28"
             data-border-radius="16">CHOSEN</div>
        <span class="label">electric-border</span>
      </div>

      <!-- Star Border -->
      <div class="cell">
        <div class="pill"
             data-effect="star-border"
             data-color="#FFD400" data-count="8"
             data-tail="18" data-speed="0.18" data-size="6"
             data-padding="40">PREMIUM</div>
        <span class="label">star-border</span>
      </div>

      <!-- Image Trail (cell shows static text since trail only during in-anim) -->
      <div class="cell">
        <div class="pill"
             data-effect="image-trail"
             data-clip data-start="0.3" data-duration="2.5"
             data-animation="fadeInLeft" data-in-duration="2.0"
             data-easing="springSmooth"
             data-trail-count="6" data-trail-stride="0.10" data-trail-decay="0.65">FLOW</div>
        <span class="label">image-trail</span>
      </div>

      <!-- Meta Balls -->
      <div class="cell">
        <div class="bg-fullsize" data-background="meta-balls"
             data-colors="#0a0a16,#FF6363,#FFD400,#0a0a16"
             data-intensity="1.0" data-scale="1.0" data-seed="2"></div>
        <span class="label">meta-balls (shader)</span>
      </div>

      <!-- Magnet Lines -->
      <div class="cell">
        <div class="bg-fullsize" data-background="magnet-lines"
             data-colors="#5BC0EB,#9d8df1,#FF6363" data-poles="4" data-gap="40" data-length="22"></div>
        <span class="label">magnet-lines</span>
      </div>

      <!-- Ribbons -->
      <div class="cell">
        <div class="bg-fullsize" data-background="ribbons"
             data-colors="#FF6363,#FFD400,#5BC0EB,#9d8df1,#2af598"
             data-count="6"></div>
        <span class="label">ribbons</span>
      </div>

    </div>
  </div>
  <script src="../runtime/spring.js"></script>
  <script src="../runtime/timeline.js"></script>
  <script src="../runtime/components.js"></script>
  <script src="../runtime/shaders.js"></script>
  <script src="../runtime/transitions.js"></script>
  <script src="../runtime/effects.js"></script>
</body>
</html>
