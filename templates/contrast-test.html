<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Contrast self-test</title>
  <link rel="stylesheet" href="../runtime/styles.css" />
</head>
<body class="mvm-preview">
  <div id="stage"
       data-composition-id="contrast-test"
       data-width="1920" data-height="1080" data-fps="15" data-duration="2">

    <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 30px; padding: 60px;">

      <!-- ❌ Bad: white-on-white  (agent forgot to set text color) -->
      <div style="background:#ffffff; padding:40px; border-radius:12px;">
        <h2>白底默认白字（看不见）</h2>
        <p>this should trigger a contrast warning</p>
      </div>

      <!-- ❌ Bad: dark-on-dark (inline color black on dark bg) -->
      <div style="background:#0a0a14; padding:40px; border-radius:12px;">
        <h2 style="color:#000">黑底黑字（看不见）</h2>
        <p style="color:rgb(20,20,30)">also invisible</p>
      </div>

      <!-- ✅ Good: mvm-card-dark — pairs auto -->
      <div class="mvm-card-dark" style="padding:40px; display:block;">
        <h2>暗卡片（默认白字）</h2>
        <p>this is fine</p>
      </div>

      <!-- ✅ Good: mvm-card-light — pairs auto -->
      <div class="mvm-card-light" style="padding:40px; display:block;">
        <h2>亮卡片（默认深字）</h2>
        <p>this is also fine</p>
      </div>

    </div>
  </div>
  <script src="../runtime/spring.js"></script>
  <script src="../runtime/timeline.js"></script>
  <script src="../runtime/components.js"></script>
  <script src="../runtime/shaders.js"></script>
  <script src="../runtime/transitions.js"></script>
  <script src="../runtime/effects.js"></script>
  <script src="../runtime/contrast-check.js"></script>
</body>
</html>
