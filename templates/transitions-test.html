<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Transitions test</title>
  <link rel="stylesheet" href="../runtime/styles.css" />
  <link rel="stylesheet" href="../assets/fonts/fonts.css" />
</head>
<body class="mvm-preview">
  <div id="stage"
       data-composition-id="trans-test"
       data-width="1920" data-height="1080" data-fps="15" data-duration="3">

    <div data-background="iridescence"
         data-colors="#2a1c4a,#FF6B6B,#4ECDC4,#0a0a16"></div>

    <div class="scene center">
      <h1 class="title text-aurora" style="font-size: 180px;">背景内容</h1>
    </div>

    <!-- Transitions at different times to capture mid-progress -->
    <div data-transition="wipe-up"
         data-start="0" data-duration="2" data-color="#FF6363"></div>
    <div data-transition="pixel-dissolve"
         data-start="0" data-duration="2" data-color="#0a0a16" data-tile="36"
         style="opacity: 0.7;"></div>
  </div>
  <script src="../runtime/spring.js"></script>
  <script src="../runtime/timeline.js"></script>
  <script src="../runtime/components.js"></script>
  <script src="../runtime/shaders.js"></script>
  <script src="../runtime/transitions.js"></script>
</body>
</html>
